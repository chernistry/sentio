name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
    paths:
      - 'root/src/**'
      - 'root/app.py'
      - 'root/ingest.py'
      - 'root/Dockerfile.api'
      - 'root/Dockerfile.worker'
      - 'root/requirements.txt'
      - 'root/.env.azure'
      - '.github/workflows/build-ghcr.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: ./root
          file: ./root/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sentio-api:latest
            ghcr.io/${{ github.repository_owner }}/sentio-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v4
        with:
          context: ./root
          file: ./root/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sentio-worker:latest
            ghcr.io/${{ github.repository_owner }}/sentio-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max 