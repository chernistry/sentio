services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ./root
      dockerfile: Dockerfile.api
    image: sentio-api:local
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - JINA_API_KEY=${JINA_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3.5:3.8b}
      - COLLECTION_NAME=Sentio_docs_v2
      - TOP_K_RERANK=${TOP_K_RERANK:-5}
      - SENTIO_MIN_SCORE=${SENTIO_MIN_SCORE:-0.05}
      - SENTIO_TOP_K=${SENTIO_TOP_K:-6}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      qdrant:
        condition: service_started
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./root:/app
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  webui:
    image: ghcr.io/open-webui/open-webui:latest
    restart: unless-stopped
    ports:
      - "3001:8080"
    environment:
      - OPENAI_API_BASE=http://api:8000
      - OPENAI_API_KEY=sk-dummy-key
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - webui_data:/app/backend/data
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Used only for initial data upload
  ingest:
    build:
      context: ./root
      dockerfile: Dockerfile.api
    image: sentio-ingest:local
    profiles: ["tools"]  # Runs only when the profile is explicitly specified
    environment:
      - JINA_API_KEY=${JINA_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - COLLECTION_NAME=Sentio_docs_v2
      - VECTOR_SIZE=2048
    volumes:
      - ./root/data/raw:/app/data/raw:ro
    command: ["python", "-m", "src.scripts.ingest", "--collection", "Sentio_docs_v2", "--data_dir", "/app/data/raw"]
    depends_on:
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
    name: sentio_qdrant_data
  webui_data:
    name: sentio_webui_data 