version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:dev
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]
    healthcheck: {test: ["CMD", "curl", "-f", "http://localhost:6333/"], interval: 10s, retries: 3}

  ollama:                           # optional; can be disabled
    image: ollama/ollama:0.1.32
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]

  api:
    build:
      context: ./root
      dockerfile: Dockerfile.api
    environment:
      - JINA_API_KEY=${JINA_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - USE_AZURE=${USE_AZURE}
      - COLLECTION_NAME=${COLLECTION_NAME}
    ports: ["8000:8000"]
    depends_on: ["qdrant"]

  worker:
    build:
      context: ./root
      dockerfile: Dockerfile.worker
    environment:
      - JINA_API_KEY=${JINA_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - USE_AZURE=${USE_AZURE}
      - COLLECTION_NAME=${COLLECTION_NAME}
    depends_on: ["qdrant"]

  ui:
    build:
      context: ./root
      dockerfile: Dockerfile.ui      # см. пример из предыдущего сообщения
    environment:
      - SENTIO_BACKEND_URL=http://api:8000
    ports: ["8501:8501"]
    depends_on: ["api"]

volumes:
  qdrant_data:
  ollama_data: 